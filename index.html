<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>就活管理システム Pro</title>

<style>
body{
    font-family: "Yu Gothic", sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:20px;
}

.container{
    max-width:1400px;
    margin:auto;
}

h1{
    text-align:center;
    color:#333;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    margin-bottom:20px;
}

input, select, textarea{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:10px;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

/* テーブル内のセレクトボックスとボタンはコンパクトに */
table select, table button {
    width: auto;
    padding: 5px;
    margin: 0;
}

button{
    background:#0078d4;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#005ea3;
}

.btn-delete {
    background: #d83b01;
}
.btn-delete:hover {
    background: #b83201;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:left;
}

th{
    background:#0078d4;
    color:white;
}

.dashboard{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
    margin-bottom: 20px;
}

.box{
    background:white;
    padding:20px;
    text-align:center;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.number{
    font-size:28px;
    font-weight:bold;
    color:#0078d4;
}
</style>
</head>

<body>

<div class="container">

<h1>就活管理システム</h1>

<div class="dashboard">
    <div class="box">
        <div>応募企業数</div>
        <div class="number" id="totalCompanies">0</div>
    </div>
    <div class="box">
        <div>面接予定</div>
        <div class="number" id="upcomingInterviews">0</div>
    </div>
    <div class="box">
        <div>内定</div>
        <div class="number" id="offers">0</div>
    </div>
    <div class="box">
        <div>不採用</div>
        <div class="number" id="rejected">0</div>
    </div>
</div>

<div class="card">
    <h2>企業登録</h2>
    <input type="text" id="company" placeholder="企業名">
    <input type="text" id="position" placeholder="応募職種">
    
    <select id="status">
        <option>応募済み</option>
        <option>書類選考中</option>
        <option>書類選考通過</option>
        <option>一次面接予定</option>
        <option>一次面接通過</option>
        <option>二次面接予定</option>
        <option>二次面接通過</option>
        <option>最終面接予定</option>
        <option>内定</option>
        <option>不採用</option>
    </select>

    <input type="date" id="interviewDate">
    <input type="time" id="interviewTime">
    <textarea id="notes" rows="3" placeholder="メモ・面接内容・企業研究"></textarea>
    <button onclick="addCompany()">登録</button>
</div>

<div class="card">
    <h2>応募企業一覧</h2>
    <table>
        <thead>
            <tr>
                <th>企業名</th>
                <th>職種</th>
                <th>選考状況</th>
                <th>面接日</th>
                <th>時間</th>
                <th>メモ</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="companyTable"></tbody>
    </table>
</div>

</div>

<script>
// 利用可能なステータス一覧（一元管理用）
const statusOptions = [
    "応募済み", "書類選考中", "書類選考通過", 
    "一次面接予定", "一次面接通過", "二次面接予定", 
    "二次面接通過", "最終面接予定", "内定", "不採用"
];

let companies = JSON.parse(localStorage.getItem("companies")) || [];

function saveData(){
    localStorage.setItem("companies", JSON.stringify(companies));
}

function updateDashboard(){
    document.getElementById("totalCompanies").innerText = companies.length;
    document.getElementById("offers").innerText = companies.filter(c => c.status === "内定").length;
    document.getElementById("rejected").innerText = companies.filter(c => c.status === "不採用").length;
    document.getElementById("upcomingInterviews").innerText = companies.filter(c => c.status.includes("面接")).length;
}

// XSS対策のためのエスケープ関数
function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>"']/g, function(match) {
        const escape = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
        return escape[match];
    });
}

function renderTable(){
    const tableBody = document.getElementById("companyTable");
    tableBody.innerHTML = "";

    companies.forEach((c, index) => {
        const tr = document.createElement("tr");

        // ステータス変更用のセレクトボックスを生成
        let selectHtml = `<select onchange="updateStatus(${index}, this.value)">`;
        statusOptions.forEach(opt => {
            const selected = c.status === opt ? "selected" : "";
            selectHtml += `<option value="${opt}" ${selected}>${opt}</option>`;
        });
        selectHtml += `</select>`;

        tr.innerHTML = `
            <td>${escapeHtml(c.company)}</td>
            <td>${escapeHtml(c.position)}</td>
            <td>${selectHtml}</td>
            <td><input type="date" value="${c.date}" onchange="updateField(${index}, 'date', this.value)"></td>
            <td><input type="time" value="${c.time}" onchange="updateField(${index}, 'time', this.value)"></td>
            <td><textarea onchange="updateField(${index}, 'notes', this.value)">${escapeHtml(c.notes)}</textarea></td>
            <td>
                <button class="btn-delete" onclick="deleteCompany(${index})">削除</button>
            </td>
        `;
        tableBody.appendChild(tr);
    });

    updateDashboard();
}

function addCompany(){
    const companyEl = document.getElementById("company");
    const positionEl = document.getElementById("position");
    const statusEl = document.getElementById("status");
    const dateEl = document.getElementById("interviewDate");
    const timeEl = document.getElementById("interviewTime");
    const notesEl = document.getElementById("notes");

    if(companyEl.value.trim() === ""){
        alert("企業名を入力してください");
        return;
    }

    companies.push({
        company: companyEl.value,
        position: positionEl.value,
        status: statusEl.value,
        date: dateEl.value,
        time: timeEl.value,
        notes: notesEl.value
    });

    saveData();
    renderTable();

    // 全ての入力フォームをリセット
    companyEl.value = "";
    positionEl.value = "";
    statusEl.selectedIndex = 0;
    dateEl.value = "";
    timeEl.value = "";
    notesEl.value = "";
}

// ステータス変更時にダッシュボードも連動して更新する関数
function updateStatus(index, newStatus) {
    companies[index].status = newStatus;
    saveData();
    updateDashboard(); 
}

// 日付やメモなど、その他のフィールドを一覧から直接編集したときの更新関数
function updateField(index, field, value) {
    companies[index][field] = value;
    saveData();
    // 日付が変わった場合など、面接予定数のカウントに影響する可能性があるためダッシュボードを更新
    updateDashboard();
}

function deleteCompany(index){
    if(confirm("削除しますか？")){
        companies.splice(index,1);
        saveData();
        renderTable();
    }
}

// 初期描画
renderTable();
</script>

</body>
</html>
